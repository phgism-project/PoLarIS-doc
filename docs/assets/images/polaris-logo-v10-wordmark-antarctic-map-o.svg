<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" role="img" aria-labelledby="title desc">
  <title id="title">PoLarIS wordmark with Antarctic map O</title>
  <desc id="desc">A PoLarIS wordmark where the letter o is a polar projection map of Antarctica with latitude and longitude lines.</desc>
  <defs>
    <linearGradient id="wordmark-fill" x1="70" y1="46" x2="560" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7fcff"/>
      <stop offset="0.55" stop-color="#b9e9f4"/>
      <stop offset="1" stop-color="#47b8d2"/>
    </linearGradient>
    <clipPath id="map-o-clip">
      <circle cx="0" cy="0" r="36"/>
    </clipPath>
  </defs>

  <rect width="640" height="180" rx="28" fill="#10222f"/>

  <text
    x="78"
    y="112"
    fill="url(#wordmark-fill)"
    font-family="Arial, Helvetica, sans-serif"
    font-size="84"
    font-weight="800"
    letter-spacing="2"
  >P</text>

  <g transform="translate(172 83)">
    <circle cx="0" cy="0" r="38" fill="#f7fcff" stroke="#eafcff" stroke-width="6"/>
    <g clip-path="url(#map-o-clip)">
      <circle cx="0" cy="0" r="23" fill="none" stroke="#4d5d64" stroke-width="1.8" stroke-dasharray="5 4" opacity="0.88"/>
      <circle cx="0" cy="0" r="12" fill="none" stroke="#4d5d64" stroke-width="1.5" stroke-dasharray="4 4" opacity="0.78"/>
      <path d="M0-36v72M-36 0h72M-25-25l50 50M25-25l-50 50" stroke="#4d5d64" stroke-width="1.6" stroke-dasharray="5 4" opacity="0.78"/>
      <path d="M-13-32l26 64M13-32l-26 64M-32-13l64 26M-32 13l64-26" stroke="#4d5d64" stroke-width="1.3" stroke-dasharray="5 5" opacity="0.64"/>

      <path
        d="M-2-25c8 1 16 6 22 12 6 7 12 9 19 15-9 2-15 7-22 11-7 5-15 4-23 8-5-8-13-11-20-17 9-3 13-10 15-19 2-7 5-10 9-10Z"
        fill="#c8ecf4"
        stroke="#10222f"
        stroke-width="2.2"
        stroke-linejoin="round"
      />
      <path
        d="M-2-25c8 1 16 6 22 12 6 7 12 9 19 15-9 2-15 7-22 11-7 5-15 4-23 8-5-8-13-11-20-17 9-3 13-10 15-19 2-7 5-10 9-10Z"
        fill="none"
        stroke="#ff2a2a"
        stroke-width="2"
        stroke-linejoin="round"
        opacity="0.95"
      />
      <path d="M-19 2c12-5 26-5 43 0" fill="none" stroke="#65c9dc" stroke-width="2" stroke-linecap="round" opacity="0.75"/>
      <path d="M-10-16c-2 12-1 23 4 34" fill="none" stroke="#65c9dc" stroke-width="2" stroke-linecap="round" opacity="0.68"/>
    </g>
    <circle cx="0" cy="0" r="38" fill="none" stroke="#10222f" stroke-width="2" opacity="0.38"/>
  </g>

  <text
    x="216"
    y="112"
    fill="url(#wordmark-fill)"
    font-family="Arial, Helvetica, sans-serif"
    font-size="84"
    font-weight="800"
    letter-spacing="2"
  >LarIS</text>
</svg>
