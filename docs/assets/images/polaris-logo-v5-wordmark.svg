<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" role="img" aria-labelledby="title desc">
  <title id="title">PoLarIS wordmark logo concept</title>
  <desc id="desc">A stylized PoLarIS wordmark with polar ice and flow-line details.</desc>
  <defs>
    <linearGradient id="letter-fill" x1="80" y1="35" x2="560" y2="135" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8fdff"/>
      <stop offset="0.45" stop-color="#bfeaf4"/>
      <stop offset="1" stop-color="#4bbbd4"/>
    </linearGradient>
    <linearGradient id="flow-line" x1="85" y1="126" x2="555" y2="126" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eafcff"/>
      <stop offset="0.45" stop-color="#69d2e6"/>
      <stop offset="1" stop-color="#087f9e"/>
    </linearGradient>
  </defs>

  <rect width="640" height="180" rx="28" fill="#10222f"/>

  <text
    x="78"
    y="106"
    fill="url(#letter-fill)"
    font-family="Arial, Helvetica, sans-serif"
    font-size="78"
    font-weight="800"
    letter-spacing="1"
  >PoLarIS</text>

  <path d="M77 125c61-11 116-13 167-5 45 7 82 20 127 18 51-2 96-20 190-12" fill="none" stroke="url(#flow-line)" stroke-width="7" stroke-linecap="round"/>
  <path d="M97 140c73-9 130-7 181 5 58 14 117 10 245-8" fill="none" stroke="#dff8fc" stroke-width="4" stroke-linecap="round" opacity="0.72"/>

  <path d="M293 52l25-34 25 34h-14l-11-15-11 15Z" fill="#ffffff" opacity="0.95"/>
  <path d="M292 52h52" stroke="#79d7e9" stroke-width="4" stroke-linecap="round"/>

  <circle cx="170" cy="77" r="25" fill="none" stroke="#eafcff" stroke-width="7"/>
  <path d="M148 82c14-8 29-9 45-3" fill="none" stroke="#63cfe3" stroke-width="5" stroke-linecap="round"/>

  <path d="M524 45v70" stroke="#eafcff" stroke-width="7" stroke-linecap="round"/>
  <path d="M524 45c24 8 43 20 57 38-13 18-32 30-57 36" fill="none" stroke="#63cfe3" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
