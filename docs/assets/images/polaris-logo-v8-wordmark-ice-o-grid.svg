<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" role="img" aria-labelledby="title desc">
  <title id="title">PoLarIS wordmark with gridded ice O</title>
  <desc id="desc">A clean PoLarIS wordmark where the letter o is represented by a gridded ice body.</desc>
  <defs>
    <linearGradient id="wordmark-fill" x1="70" y1="45" x2="560" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7fcff"/>
      <stop offset="0.55" stop-color="#b9e9f4"/>
      <stop offset="1" stop-color="#47b8d2"/>
    </linearGradient>
    <linearGradient id="ice-o-fill" x1="-30" y1="-28" x2="34" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#d7f3fa"/>
      <stop offset="1" stop-color="#6bcce1"/>
    </linearGradient>
    <clipPath id="ice-o-clip">
      <path d="M-4-32c14 2 28 12 34 25 7 17 0 35-16 43-15 8-35 3-45-11-10-15-8-34 5-47 6-6 13-10 22-10Z"/>
    </clipPath>
  </defs>

  <rect width="640" height="180" rx="28" fill="#10222f"/>

  <text
    x="78"
    y="112"
    fill="url(#wordmark-fill)"
    font-family="Arial, Helvetica, sans-serif"
    font-size="84"
    font-weight="800"
    letter-spacing="2"
  >P</text>

  <g transform="translate(172 83)">
    <path
      d="M-4-32c14 2 28 12 34 25 7 17 0 35-16 43-15 8-35 3-45-11-10-15-8-34 5-47 6-6 13-10 22-10Z"
      fill="url(#ice-o-fill)"
      stroke="#eafcff"
      stroke-width="6"
      stroke-linejoin="round"
    />

    <g clip-path="url(#ice-o-clip)">
      <path d="M-29-9c17-5 36-5 58 0" fill="none" stroke="#349fba" stroke-width="3" stroke-linecap="round" opacity="0.72"/>
      <path d="M-31 8c18-4 39-3 62 2" fill="none" stroke="#349fba" stroke-width="3" stroke-linecap="round" opacity="0.66"/>
      <path d="M-17-27c-4 18-3 38 4 59" fill="none" stroke="#349fba" stroke-width="3" stroke-linecap="round" opacity="0.62"/>
      <path d="M6-29c-4 18-3 38 5 58" fill="none" stroke="#349fba" stroke-width="3" stroke-linecap="round" opacity="0.62"/>
      <path d="M-21-20c13-7 28-8 45-2" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" opacity="0.62"/>
    </g>
  </g>

  <text
    x="216"
    y="112"
    fill="url(#wordmark-fill)"
    font-family="Arial, Helvetica, sans-serif"
    font-size="84"
    font-weight="800"
    letter-spacing="2"
  >LarIS</text>
</svg>
