<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 180" role="img" aria-labelledby="title desc">
  <title id="title">PoLarIS wordmark with round gridded ice O</title>
  <desc id="desc">A PoLarIS wordmark where the letter o is a rounded three-dimensional gridded ice body.</desc>
  <defs>
    <linearGradient id="wordmark-fill" x1="70" y1="46" x2="560" y2="112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f7fcff"/>
      <stop offset="0.55" stop-color="#b9e9f4"/>
      <stop offset="1" stop-color="#47b8d2"/>
    </linearGradient>
    <linearGradient id="ice-top" x1="-32" y1="-28" x2="34" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e8fbff"/>
      <stop offset="1" stop-color="#79d3e6"/>
    </linearGradient>
    <linearGradient id="ice-side" x1="-28" y1="3" x2="32" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#84d7e8"/>
      <stop offset="1" stop-color="#3baac4"/>
    </linearGradient>
    <clipPath id="ice-o-top-clip">
      <ellipse cx="0" cy="-6" rx="34" ry="25"/>
    </clipPath>
    <clipPath id="ice-o-body-clip">
      <path d="M-34-6c0-14 15-25 34-25S34-20 34-6v19c0 14-15 25-34 25s-34-11-34-25Z"/>
    </clipPath>
  </defs>

  <rect width="640" height="180" rx="28" fill="#10222f"/>

  <text
    x="78"
    y="112"
    fill="url(#wordmark-fill)"
    font-family="Arial, Helvetica, sans-serif"
    font-size="84"
    font-weight="800"
    letter-spacing="2"
  >P</text>

  <g transform="translate(172 82)">
    <path
      d="M-34-6c0-14 15-25 34-25S34-20 34-6v19c0 14-15 25-34 25s-34-11-34-25Z"
      fill="url(#ice-side)"
      stroke="#eafcff"
      stroke-width="5"
      stroke-linejoin="round"
    />
    <ellipse cx="0" cy="-6" rx="34" ry="25" fill="url(#ice-top)" stroke="#eafcff" stroke-width="5"/>

    <g clip-path="url(#ice-o-body-clip)" stroke="#10222f" stroke-width="2.2" opacity="0.82">
      <path d="M-34-6c20 7 43 7 68 0" fill="none"/>
      <path d="M-34 8c20 7 43 7 68 0" fill="none"/>
      <path d="M-30 22c18 6 38 6 60 0" fill="none"/>
      <path d="M-18-28v63" fill="none"/>
      <path d="M0-31v69" fill="none"/>
      <path d="M18-28v63" fill="none"/>
    </g>

    <g clip-path="url(#ice-o-top-clip)" stroke="#10222f" stroke-width="2.3" opacity="0.86">
      <path d="M-32-11c18 7 41 7 64 0" fill="none"/>
      <path d="M-27 2c17 5 36 5 54 0" fill="none"/>
      <path d="M-16-28c-7 13-7 28 0 44" fill="none"/>
      <path d="M0-31c-4 15-4 31 0 48" fill="none"/>
      <path d="M16-28c7 13 7 28 0 44" fill="none"/>
    </g>

    <path
      d="M-22-13c14-8 34-6 50 4"
      fill="none"
      stroke="#ffffff"
      stroke-width="3.5"
      stroke-linecap="round"
      opacity="0.75"
    />
    <path
      d="M-24-1c15 11 34 15 55 9"
      fill="none"
      stroke="#ff2d2d"
      stroke-width="5"
      stroke-linecap="round"
      opacity="0.95"
    />
  </g>

  <text
    x="216"
    y="112"
    fill="url(#wordmark-fill)"
    font-family="Arial, Helvetica, sans-serif"
    font-size="84"
    font-weight="800"
    letter-spacing="2"
  >LarIS</text>
</svg>
