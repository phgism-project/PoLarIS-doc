<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-labelledby="title desc">
  <title id="title">PoLarIS ice-sheet profile logo concept</title>
  <desc id="desc">A stylized ice-sheet cross section with bedrock and glacier flow lines.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16384b"/>
      <stop offset="1" stop-color="#10222f"/>
    </linearGradient>
    <linearGradient id="ice-profile" x1="58" y1="44" x2="238" y2="139" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.55" stop-color="#caeff7"/>
      <stop offset="1" stop-color="#79cfe2"/>
    </linearGradient>
    <linearGradient id="bed" x1="48" y1="125" x2="284" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2d5261"/>
      <stop offset="1" stop-color="#193240"/>
